name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk unzip
          java -version

      - name: Setup Android SDK
        run: |
          mkdir -p ~/android-sdk/cmdline-tools
          cd ~/android-sdk/cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          echo "ANDROID_HOME=~/android-sdk" >> $GITHUB_ENV
          export PATH=$PATH:~/android-sdk/cmdline-tools/latest/bin
          yes | ~/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          ~/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        env:
          ANDROID_HOME: ~/android-sdk
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          cd app
          curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          export GRADLE_HOME=/tmp/gradle-8.4
          export PATH=$PATH:$GRADLE_HOME/bin
          gradle --version
          gradle assembleDebug --no-daemon

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ReadTTS-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Show logs on failure
        if: failure()
        run: |
          find app/build -name "*.log" 2>/dev/null | head -5
          cat app/build/reports/**/*.txt 2>/dev/null || true
