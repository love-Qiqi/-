name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk wget unzip
          java -version

      - name: Setup Android SDK
        run: |
          mkdir -p ~/android-sdk/cmdline-tools
          cd ~/android-sdk/cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          export ANDROID_HOME=~/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        env:
          ANDROID_HOME: ~/android-sdk
          PATH: ${{ env.PATH }}:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        run: |
          cd app
          curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          export GRADLE_HOME=/tmp/gradle-8.4
          export PATH=$PATH:$GRADLE_HOME/bin
          gradle --version
          gradle assembleDebug --no-daemon 2>&1
          echo "=== Build output ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK not found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ReadTTS-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Show error logs
        if: failure()
        run: |
          cat app/build/outputs/logs/*.log 2>/dev/null || true
          find app/build -name "*.log" 2>/dev/null | head -5
